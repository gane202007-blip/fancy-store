<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fancy Store</title>
  
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#00e0ff">

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<header class="header">

<div class="logo">FancyStore</div>

<div class="menu-toggle" onclick="toggleMenu()">☰</div>

<nav class="nav" id="nav">
<a href="#">Home</a>
<a href="#">Products</a>
<a href="#">About</a>
<a href="admin.html">Admin</a>
<a href="login.html">Login</a>
<a href="#" onclick="logout()">Logout</a>
<a href="#">Contact</a>

</nav>

<div class="header-right">

<input type="text" id="search" placeholder="Search products">

<button class="theme-btn" onclick="toggleTheme()">🌙</button>

<div class="cart-icon" onclick="toggleCart()">
🛒 <span id="cart-count">0</span>
</div>

</div>

</header>

<section class="hero">

<h1>Premium Tech Store</h1>
<p>Modern gadgets for your lifestyle</p>

<button onclick="scrollProducts()">Shop Now</button>

</section>

<div class="store-controls">

<select id="categoryFilter">
<option value="all">All Categories</option>
<option value="audio">Audio</option>
<option value="wearable">Wearables</option>
</select>

<select id="sortPrice">
<option value="default">Sort By</option>
<option value="low">Price: Low → High</option>
<option value="high">Price: High → Low</option>
</select>

</div>

<section class="products" id="products"></section>

<section class="recent">

<h2>Recently Viewed</h2>

<div id="recent-products"></div>

</section>

<!-- CART -->

<div class="cart-modal" id="cart-modal">

<div class="cart-content">

<h2>Your Cart</h2>

<div id="cart-items"></div>

<h3 id="cart-total"></h3>

<button onclick="clearCart()">Clear Cart</button>
<button onclick="toggleCart()">Close</button>

</div>

</div>

<!-- TOAST -->

<div id="toast">Product added to cart</div>

<footer>
<p>© 2026 Fancy Store</p>
</footer>

<script src="script.js"></script>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js")
  .then(() => console.log("Service Worker Registered"));
}
</script>

</body>
</html>
